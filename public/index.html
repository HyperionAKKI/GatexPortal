<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GateX Registration Portal</title>
  <meta name="description" content="GateX registration and evidence capture portal for schools, offices, clinics, factories, and managed operational sites." />
  <link rel="icon" type="image/png" href="assets/gatex-logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app-shell">
    <nav class="topbar">
      <button class="brand-block" onclick="showHome()">
        <img src="assets/gatex-logo.png" alt="GateX logo" class="brand-logo" />
        <span class="brand-text">
          <strong>GateX</strong>
          <small>Registration Portal</small>
        </span>
      </button>
      <div class="nav-actions">
        <button class="btn btn-ghost" onclick="showAdminDashboard()">Admin</button>
        <button class="btn btn-primary" onclick="startFlow()">New Registration</button>
      </div>
    </nav>

    <main id="mainContent"></main>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
